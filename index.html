<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <title>MARS Login</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: url("img/6393108b4497ba0a4e81bde6de3c7da46b4b07d3.png") no-repeat center center/cover;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .login-box {
      background:#fff;
      padding: 30px;
      border-radius: 10px;
      color: black;
      width: 300px;
      text-align: center;
    }
    .login-box h2 {
      margin-bottom: 20px;
    }
    .login-box input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 5px;
    }
    .login-box button {
      width: 100%;
      padding: 10px;
      background: #ff6600;
      border: none;
      border-radius: 5px;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
    }
    .login-box button:hover {
      background: #ff3300;
    }
    .register {
      margin-top: 15px;
      font-size: 14px;
    }
    .register a {
      color: #ffb109;
      text-decoration: none;
    }

    .inp{
        border:solid 2px black;
    }
  </style>
</head>
